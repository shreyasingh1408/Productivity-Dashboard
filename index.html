<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">

        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://images.unsplash.com/photo-1635241161466-541f065683ba?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://images.unsplash.com/photo-1718202248160-59558af70521?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8M2R8ZW58MHx8MHx8fDA%3D" alt="">
                <h2>Daily Planner</h2>
            </div>
             <div class="moti elem" id="2">
                <img src="https://images.unsplash.com/photo-1695196312518-b1223a8298b5?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8ODB8fDNkfGVufDB8fDB8fHww" alt="">
                <h2>Motivation</h2>
            </div>
             <div class="pomo elem" id="3">
                <img src="https://images.unsplash.com/photo-1654938900760-1419ee86bc1d?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzZ8fDNkfGVufDB8fDB8fHww" alt="">
                <h2>Pomodoro Timer</h2>
            </div>
             <div class="goals elem" id="4">
                <img src="https://plus.unsplash.com/premium_photo-1711136314731-8c3fe1831672?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Njl8fDNkfGVufDB8fDB8fHww" alt="">
                <h2>Daily Goals</h2>
            </div>

        </section>

        <section class="fullElem todo-list-fullpage" >
            <button class="back" id="0"> Close </button>
            <h2>Your Personalised Task List</h2>

            <div class="todo-container">
                <div class="addTask">
                    <form>

                        <input id="task-input" type="text" placeholder="Enter Task">
                        <textarea placeholder="Enter Details" name="" id="" cols="30" rows="10"></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" name="" id="check">
                            <label for="check">Mark as Important!</label>
                        </div>
                        <button>Add Task</button>
                    </form>
                </div>

                <div class="allTask">
                    
                    
                </div>
            </div>




        </section>
        <section class="fullElem daily-planner-fullpage">
            <button class="back" id="1"> Close</button>
            <h2>Plan your day to be more productive</h2>


            <div class="day-planner">
                <div class="day-planner-time">
                    <p>6:00</p>
                    <input type="text" placeholder="...">
                </div>
                <div class="day-planner-time">
                    <p>6:00</p>
                    <input type="text" placeholder="...">
                </div>
               
            </div>

        </section>
        <section class="fullElem motivational-fullpage">
            <button class="back" id="2"> Close</button>
            <h1>Motivational Quote</h1>
        </section>
        <section class="fullElem pomodoro-fullpage">
            <button class="back" id="3"> Close</button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem daily-goals-fullpage">
            <button class="back" id="4">Close</button>
            <h1>Daily Goals</h1>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
